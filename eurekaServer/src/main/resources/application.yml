spring: 
  application: 
    name: eurekaServer
---
spring:
  profiles: eurekaServer1
eureka:
  instance:
    #hostname: localhost
    prefer-ip-address: true
  client:
    registerWithEureka: false
    fetchRegistry: false
    serviceUrl:
      defaultZone: http://127.0.0.1:8081/eureka/
---
spring:
  profiles: eurekaServer2
eureka:
  instance:
    #hostname: localhost
    prefer-ip-address: true
  client:
    registerWithEureka: false
    fetchRegistry: false
    serviceUrl:
      defaultZone: http://127.0.0.1:8080/eureka/